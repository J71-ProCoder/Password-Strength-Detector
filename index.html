<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassGuard | Password Strength Checker</title>
    <meta name="description" content="Check your password strength in real-time. See how fast it can be hacked, get breach alerts, and generate secure passwords.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glow"></div>
        
        <div class="header">
            <div class="shield-icon">🛡️</div>
            <h1>PassGuard</h1>
            <p class="tagline">Your digital fortress, one password at a time</p>
        </div>

        <div class="input-wrapper">
            <div class="input-group">
                <input type="password" id="password" placeholder="Enter your password..." autocomplete="off">
                <button id="togglePassword" class="toggle-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <div class="strength-section">
            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Strength Score</span>
                    <div class="stat-value">
                        <span id="scoreValue">0</span>
                        <span class="stat-unit">/100</span>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Crack Time</span>
                    <div class="stat-value" id="crackTime">—</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Security Level</span>
                    <div class="stat-value" id="strengthLabel">Very Weak</div>
                </div>
            </div>
        </div>

        <div class="suggestions" id="suggestions">
            <div class="suggestions-header">
                <span>💡 Security Tips</span>
            </div>
            <ul id="suggestionsList">
                <li>Enter a password to get personalized tips</li>
            </ul>
        </div>

        <div class="action-buttons">
            <button id="generateBtn" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 2L9 14M21 2l-4 8-4-8 8 4zM3 12l3-3-3-3 6 6-6 6z"/>
                </svg>
                Generate Strong Password
            </button>
            <button id="breachCheckBtn" class="btn btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                Check Breach Status
            </button>
        </div>

        <div id="breachResult" class="breach-result"></div>

        <footer>
            <p>🔒 Your password never leaves this device. All checks happen locally in your browser.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
